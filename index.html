<!DOCTYPE html>
<html>
<head>
<title>Life Edit by Anna</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  color: #2b2b2b;
  background: linear-gradient(180deg, #f8f6f4 0%, #f3eeeb 50%, #f8f6f4 100%);
}

/* NAV */
.nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 20px;
  font-size: 13px;
}

.nav a {
  text-decoration: none;
  color: #6b5c61;
}

/* HERO */
.hero {
  padding: 50px 20px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

.hero p {
  color: #8a7c80;
}

/* INTRO */
.intro {
  text-align: center;
  margin-top: 30px;
  font-size: 14px;
  color: #9c8e93;
}

/* SECTION */
.section-title {
  text-align: center;
  margin-top: 70px;
}

.section-title h2 {
  font-family: 'Playfair Display', serif;
}

/* CATEGORY GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 16px;
}

.card {
  text-align: center;
}

/* BUTTON */
a {
  display: inline-block;
  margin-top: 8px;
  padding: 10px 18px;
  border-radius: 30px;
  text-decoration: none;
  color: #5a4a4f;
  font-size: 13px;
  border: 1px solid #e5dede;
  background: #faf8f7;
}

/* PRODUCTS */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.product-item img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  background: white;
  border-radius: 12px;
  padding: 10px;
}

.product-item {
  text-align: center;
}

/* DISCLAIMER */
.disclaimer {
  text-align: center;
  font-size: 11px;
  color: #a89a9e;
  margin-top: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 60px;
  font-size: 12px;
  color: #8c7b80;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<a href
